# Render.com blueprint — single web service (Next UI + Nest API) + Postgres
databases:
  - name: liqvia2-db
    databaseName: liqvia2
    user: liqvia
    plan: free

services:
  - type: web
    name: liqvia2
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: liqvia2-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: HOSTNAME
        value: 0.0.0.0
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DEMO_GUEST_ENABLED
        value: "true"
      # Set to your public URL after first deploy, e.g. https://liqvia2.onrender.com
      - key: APP_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: noreply@liqvia.com
