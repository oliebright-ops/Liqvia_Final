# Render.com blueprint — single web service (Next UI + Nest API) + Postgres
databases:
  - name: liqvia2-db
    databaseName: liqvia2
    user: liqvia
    plan: free

services:
  - type: web
    name: liqvia2
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: liqvia2-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
